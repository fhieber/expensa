# Initial expense categories (in German). Edit freely.
# Each category has a name, description (used by the zero-shot
# category-similarity stage to match expense embeddings against),
# and a color for visualizations.
#
# Descriptions should LEAD with concrete merchant names / German + English
# keywords. The cascade's category_similarity stage embeds both the name and
# the description and takes the per-category max cosine, so keyword-dense
# descriptions improve cold-start predictions a lot.

